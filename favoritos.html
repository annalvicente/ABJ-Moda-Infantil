</head>
<body>

    <div class="container">
        <h1><i class="fa-solid fa-heart"></i> Meus Favoritos</h1>
        <div id="lista-favoritos">
            </div>
        <a href="index.html" class="voltar">← Voltar para a Loja</a>
    </div>

    <script>
        // Puxa os dados do localStorage (mesma lógica do seu carrinho)
        let favoritosLoja = JSON.parse(localStorage.getItem('meusFavoritos')) || [];
        let produtosLoja = JSON.parse(localStorage.getItem('meusProdutos')) || [];

        function renderizarFavoritos() {
            const lista = document.getElementById('lista-favoritos');
            lista.innerHTML = '';

            if (favoritosLoja.length === 0) {
                lista.innerHTML = '<p style="text-align:center; padding: 40px;">Você ainda não favoritou nada.</p>';
                return;
            }

            favoritosLoja.forEach(p => {
                lista.innerHTML += `
                    <div class="fav-item">
                        <div class="fav-info">
                            <img src="${p.img}" alt="${p.nome}">
                            <div>
                                <h3 style="margin:0;">${p.nome}</h3>
                                <p style="margin:5px 0; color:#ff69b4; font-weight:bold;">R$ ${parseFloat(p.preco).toFixed(2).replace('.', ',')}</p>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <button class="btn-carrinho" onclick="adicionarAoCarrinhoERedirecionar(${p.id})">
                                <i class="fa-solid fa-cart-shopping"></i> Ir para o carrinho
                            </button>
                            <i class="fa-solid fa-trash-can btn-remover" onclick="removerFavorito(${p.id})"></i>
                        </div>
                    </div>
                `;
            });
        }

        function removerFavorito(id) {
            favoritosLoja = favoritosLoja.filter(item => item.id !== id);
            localStorage.setItem('meusFavoritos', JSON.stringify(favoritosLoja));
            renderizarFavoritos();
        }

        // Função que integra com a sua lógica de vendas
        function adicionarAoCarrinhoERedirecionar(id) {
            const p = produtosLoja.find(item => item.id === id);
            if (p && p.estoque > 0) {
                // Diminuir estoque no localStorage
                p.estoque--;
                localStorage.setItem('meusProdutos', JSON.stringify(produtosLoja));
                
                // Aqui você pode disparar a lógica de adicionar ao carrinho
                // Como esta é uma página separada, o ideal é salvar o pedido no localStorage
                alert(`${p.nome} foi enviado para o carrinho!`);
                window.location.href = 'index.html'; // Redireciona para a loja onde o carrinho abre
            } else {
                alert("Produto esgotado no momento! ");
            }
        }

        // Inicia a renderização ao abrir a página
        renderizarFavoritos();
    </script>
</body>
</html>
