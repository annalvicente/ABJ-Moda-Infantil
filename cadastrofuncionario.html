<!DOCTYPE html>
<html lang="pt-br"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - ABJ Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">  
</head>

<body>

    <header>
            <div class="nav-container">
            <nav class="menu-links" >
               <a href="#" style="color: #dc059b;" >meninas</a>
               <a href="#" style="color: #1ab44d;" >meninos</a>
               <a href="#" style="color: #07ada5;" >bebês</a>
                
            </nav>
            <a href="index.html" class="logo">
                <img src="img/logoabj.webp" alt="Balão Logo">
            </a>

            <div class="user-actions">
                <a href="login.html" title="Entrar ou Cadastrar"><i class="fa-regular fa-user"></i></a>
                <div style="position: relative; display: inline-block; cursor: pointer;" onclick="toggleCart()">
                    <i class="fa-solid fa-basket-shopping"></i>
                    <span id="cart-count" class="cart-badge">0</span>
            </div>

                <i class="fa-regular fa-heart"></i>
                <a href="#contato" ><i class="fa-regular fa-comment"></i></a>
            </div>
        </div>
    </header>

    <main>
        <div class="cadastro-wrap">
            <h2>Crie sua conta</h2>
            
            <div class="toggle-buttons">
                <button type="button" class="toggle-btn" id="btn-cliente" onclick="window.location.href='cadastrocliente.html'">Sou Cliente</button>
                <button type="button" class="toggle-btn active" id="btn-vendedor">Sou Vendedor</button>
            </div>

            

            <form action="cadastro.php" method="POST">
                
                <input type="hidden" name="tipo_form" id="tipo_form" value="funcioa">

                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" name="nome" placeholder="Seu nome" required>
                </div>

                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div id="campos-especificos">
                    <div class="input-group">
                        <label>CPF</label>
                        <input type="text" name="cpf" placeholder="000.000.000-00">
                    </div>
                    <div class="input-group">
                        <label>Data de Nascimento</label>
                        <input type="date" name="data_nascimento">
                    </div>
                    <div class="input-group">
                        <label>Telefone</label>
                        <input type="text" name="telefone" placeholder="(00) 00000-0000">
                    </div>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" name="senha" placeholder="******" required>
                </div>

                <button type="submit" class="btn-submit" id="submit-text">Cadastrar Funcionario</button>
            </form>
            
            <p style="margin-top: 20px; font-size: 0.9rem;">
                <a href="index.html" style="color: #999; text-decoration: none;">Voltar para a loja</a>
            </p>
        </div>
    </main>

    <script>
        function trocarTipo(tipo) {
            // Ajusta o valor do campo escondido para o PHP ler
            document.getElementById('tipo_form').value = tipo;

            // Estilização dos botões
            document.getElementById('btn-cliente').classList.toggle('active', tipo === 'cliente');
            document.getElementById('btn-vendedor').classList.toggle('active', tipo === 'vendedor');

            // Ajusta o texto do botão
            const btnSubmit = document.getElementById('submit-text');
            if (tipo === 'vendedor') {
                btnSubmit.innerText = "Cadastrar Vendedor";
                btnSubmit.style.backgroundColor = "#27ae60";
            } else {
                btnSubmit.innerText = "Cadastrar Cliente";
                btnSubmit.style.backgroundColor = "#e94d76";
            }
        }
    </script>

    <header>
        <div id="msg-validacao" class="status-msg">
    <i class="fa-solid fa-check-double"></i> Tudo pronto! Pode clicar em cadastrar.
</div>
    </header>
    
</body>
</html>
