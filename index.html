<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABJ Style - ABJ Style</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="status-usuario"></div>

    <header>
        <div class="nav-container" style="display: flex; align-items: center; justify-content: space-between; padding: 10px 20px;">
            <nav class="menu-links" style="font-weight: bold; font-size: 18px;">
               <a href="#" style="color: #dc059b;">meninas</a>
               <a href="#" style="color: #1ab44d;">meninos</a>
               <a href="#" style="color: #07ada5;">bebês
                

            </nav>
            <a href="index.html" class="logo">
                <img src="img/logoabj.webp" alt="Balão Logo">
            </a>
            <div class="user-actions">
                <a href="login.html" title="Entrar ou Cadastrar"><i class="fa-regular fa-user"></i></a>
                <div style="position: relative; display: inline-block; cursor: pointer;" onclick="toggleCart()">
                    <i class="fa-solid fa-basket-shopping"></i>
                    <span id="cart-count" class="cart-badge">0</span>
                </div>
                <i class="fa-regular fa-heart"></i>
                <a href="#contato" style="color: inherit; text-decoration: none;"><i class="fa-regular fa-comment"></i></a>
            </div>
        </div>
    </header>

    <div class="search-container">
        <form class="search-box" id="searchForm">
            <i class="fa-solid fa-magnifying-glass" onclick="executarBusca()" style="cursor: pointer;"></i>
            <input type="text" id="searchInput" placeholder="O que você procura?">
            <i class="fa-solid fa-xmark" onclick="limparBusca()" style="cursor: pointer;"></i>
        </form>
    </div>

    <main>
        <section class="hero-banner">
            <div class="hero-image"><img src="img/quatrokids.webp" alt="Crianças felizes"></div>
            <div class="hero-text">
                <h2>O conforto que seu filho merece!</h2>
                <p>Com frete grátis.</p>
            </div>
        </section>

        <section class="carousel-section">
            <button class="nav-arrow prev" onclick="moverCarrossel(-1)"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="carousel-track" id="track">
                <div class="card"><img src="img/duaskids.webp" alt="Destaque"></div>
                <div class="card"><img src="img/pij-duaskids.webp" alt="Pijamas"></div>
                <div class="card"><img src="img/fant_duaskid.webp" alt="Fantasias"></div>
                <div class="card"><img src="img/fant_batman.webp" alt="Acessórios"></div>
                <div class="card"><img src="img/fant_wood.webp" alt="Kids"></div>
            </div>
            <button class="nav-arrow next" onclick="moverCarrossel(1)"><i class="fa-solid fa-arrow-right"></i></button>
        </section>



     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<div class="container-central">
    <a href="painel.html" class="botao-pilula-simples">
        <div class="lado-branco-completo">
            <i class="fa-solid fa-cart-plus"></i>
            <span>Cadastrar Produto</span>
        </div>
    </a>
</div>

    <footer id="contato" class="footer-custom">
        <div class="footer-container-custom">
            <div class="footer-section">
                <div class="footer-brand">
                    <i class="fa-regular fa-comments chat-icon"></i>
                    <div class="brand-info">
                        <h3>ABJ Moda infantil</h3>
                        <p>Telefone: 12 981714147</p>
                        <p>Email: ABJmodainfantil@gmail.com</p>
                    </div>
                </div>
            </div>
            <div class="footer-section">
                <div class="footer-links-social">
                    <div class="social-item"><i class="fa-brands fa-instagram"></i><span>@ABJ_modainfantil</span></div>
                    <div class="social-item"><i class="fa-solid fa-location-dot"></i><span>Av. Exemplo, 123</span></div>
                    <a href="#" class="faq-link">FAQ</a>
                </div>
            </div>
        </div>
    </footer>

    <div id="side-cart" class="cart-container">
        <div class="cart-header">
            <h3>Meu Carrinho</h3>
            <button onclick="toggleCart()" class="close-btn">&times;</button>
        </div>
        <div class="cart-items" id="cart-items-list"></div>
        <div class="cart-footer">
            <div class="cart-total"><span>Total:</span><span id="cart-total-value">R$ 0,00</span></div>
            <button class="checkout-btn">Finalizar Compra</button>
        </div>
    </div>

    <div id="overlay" onclick="fecharTudo()"></div>

    <script src="Carrinho.js"></script>
    <script src="loja.js"></script>
    
    <div id="overlay-favoritos" onclick="toggleFavoritos()"></div>

<div id="favoritos-container" class="fav-container">
    <div class="fav-header">
        <div class="fav-header-title">
            <h3>Favoritos</h3>
            <i class="fa-solid fa-heart" style="color: #ffb6c1;"></i>
        </div>
        <button class="close-btn" onclick="toggleFavoritos()">&times;</button>
    </div>

    <div class="fav-content">
        <div class="fav-select-all">
            <input type="checkbox" id="selecionar-todos">
            <label for="selecionar-todos">Selecionar</label>
        </div>

        <div id="lista-favoritos" class="fav-items">
            <p style="text-align: center; color: #999; margin-top: 20px;">Sua lista está vazia.</p>
        </div>
    </div>

    <div class="fav-footer">
        <button class="btn-fav-carrinho" onclick="adicionarFavoritosAoCarrinho()">
            Adicionar ao carrinho
        </button>
    </div>


</div>
</body>
</html>
