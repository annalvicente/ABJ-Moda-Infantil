<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ABJ Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            font-family: 'Quicksand', sans-serif;
        }
        .login-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Quicksand';
        }
        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: #e94d76;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .login-type-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .radio-label { font-size: 0.9rem; cursor: pointer; }
        .create-account-link { margin-top: 20px; font-size: 0.9rem; color: #666; }
        .create-account-link a { color: #e94d76; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body style="background-color: #fcfcfc;">

    <header>
        <div class="nav-container" style="display: flex; align-items: center; justify-content: space-between; padding: 10px 20px;">
            <nav class="menu-links">
                <a href="index.html">meninas</a>
                <a href="index.html">meninos</a>
                <a href="index.html">bebês</a>
            </nav>

            <a href="index.html" class="logo">
                <img src="logoabj.webp" alt="Balão" style="max-height: 60px;">
            </a>

            <div class="user-actions">
                <a href="login.html"><i class="fa-regular fa-user"></i></a>
                <i class="fa-solid fa-basket-shopping"></i>
                <i class="fa-regular fa-heart"></i>
                <a href="index.html#contato"><i class="fa-regular fa-comment"></i></a>
            </div>
        </div>
    </header>

    <main>
        <div class="login-box">
            <h2>Acesse sua conta</h2>
            
            <form id="formLogin" action="login.php" method="POST">
                
                <div class="login-type-group">
                    <label class="radio-label">
                        <input type="radio" name="tipo_usuario" value="cliente" checked> Sou Cliente
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="tipo_usuario" value="vendedor"> Sou Vendedor
                    </label>
                </div>

                <input type="email" id="email" name="email" class="login-input" placeholder="Seu e-mail" required>
                <input type="password" id="senha" name="senha" class="login-input" placeholder="Sua senha" required>

                <button type="submit" class="btn-login">ENTRAR</button>
            </form>

            <div class="create-account-link">
                Ainda não tem conta? 
                <a href="cadastro.html">Cadastre-se aqui</a><br>
                <span style="font-size: 0.75rem;">(Vendedores também se cadastram por lá!)</span>
            </div>

            <p style="margin-top: 20px; font-size: 0.85rem;">
                <a href="index.html" style="color: #aaa; text-decoration: none;">Voltar para a loja</a>
            </p>
        </div>
    </main>

    <script>
        // A lógica de validação agora é feita pelo login.php no servidor.
        console.log("Formulário conectado ao Banco de Dados.");
    </script>

</body>
</html>
